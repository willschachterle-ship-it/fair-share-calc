<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Labor Value Audit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Labor Value Audit</h1>
            <p>Live Corporate Wealth Analysis</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label for="company">Company Ticker</label>
                <input type="text" id="company" placeholder="e.g. TSLA, MSFT, NVDA">
            </div>

            <div class="toggle-container">
                <button id="annualToggle" class="toggle-btn active">Annual Salary</button>
                <button id="hourlyToggle" class="toggle-btn">Hourly Wage</button>
            </div>

            <div id="salaryInputs">
                <div class="input-group">
                    <label for="annualSalary">Annual Salary ($)</label>
                    <input type="number" id="annualSalary" placeholder="e.g. 60000">
                </div>
            </div>

            <div id="hourlyInputs" class="hidden">
                <div class="input-group">
                    <label for="hourlyWage">Hourly Wage ($)</label>
                    <input type="number" id="hourlyWage" placeholder="15.00">
                </div>
                <div class="row">
                    <div class="input-group">
                        <label for="hoursPerWeek">Hours / Week</label>
                        <input type="number" id="hoursPerWeek" value="40">
                    </div>
                    <div class="input-group">
                        <label for="weeksWorked">Weeks / Year</label>
                        <input type="number" id="weeksWorked" value="52">
                    </div>
                </div>
            </div>

            <button id="calculateBtn">Calculate My Fair Share</button>
            <p id="loadingMsg" class="hidden" style="text-align:center; font-size:0.8em; color:#666; margin-top:10px;">Querying SEC Filings...</p>
        </div>

        <div id="results" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
