<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fair Share Calculator | 2026 Audit</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Find Your Fair Share</h1>
            <p class="subtitle">Compare your 2026 federal taxes against the surplus value your company keeps.</p>
        </header>
        
        <div class="input-section">
            <div class="form-group">
                <label for="company">Company Name</label>
                <input type="text" id="company" list="companyList" placeholder="Start typing (e.g. Apple, Amazon, Tesla...)">
                <datalist id="companyList"></datalist>
            </div>
            
            <div class="toggle-container">
                <button id="annualToggle" class="active">Annual Salary</button>
                <button id="hourlyToggle">Hourly Wage</button>
            </div>

            <div id="salaryInputs">
                <input type="number" id="annualSalary" placeholder="Your Yearly Salary ($)">
            </div>

            <div id="hourlyInputs" class="hidden">
                <input type="number" id="hourlyWage" placeholder="Hourly Rate ($)">
                <div class="grid-inputs">
                    <input type="number" id="hoursPerWeek" placeholder="Hrs/Week" value="40">
                    <input type="number" id="weeksWorked" placeholder="Weeks/Year" value="52">
                </div>
            </div>

            <button id="calculateBtn">Calculate My Share</button>
        </div>

        <div id="results" class="hidden">
            <div class="result-grid">
                <div class="card official">
                    <h3>Official Profit Share</h3>
                    <p class="amount" id="officialAmount">$0</p>
