<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fair Share — Design Preview</title>
    <style>
        body { background: #fdfaf5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #fff; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 420px; padding: 32px; border: 1px solid #f0ede8; }
        .flag { width: 60px; display: block; margin: 0 auto 16px; }
        h1 { text-align: center; font-size: 2em; color: #1a2b3c; margin-bottom: 4px; }
        .subtitle { text-align: center; font-size: 0.75em; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px; }
        .input-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        label { font-size: 0.7em; font-weight: 800; color: #6c757d; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input { width: 100%; border: 1px solid #dee2e6; border-radius: 8px; padding: 12px; font-size: 1em; background: #fff; box-sizing: border-box; }
        .toggle-container { display: flex; gap: 8px; margin-bottom: 16px; }
        .toggle-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #dee2e6; background: #fff; font-size: 0.85em; font-weight: 600; cursor: pointer; }
        .active-toggle { background: #e7effc; color: #3056a0; border-color: #3056a0; }
        .calc-btn { width: 100%; background: #3056a0; color: #fff; border: none; padding: 16px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        #results-area { margin-top: 24px; border-top: 1px solid #eee; padding-top: 24px; }
        .fs-label { font-size: 0.8em; font-weight: 800; color: #3056a0; text-transform: uppercase; margin-bottom: 12px; }
        .company-name { font-size: 1.5em; font-weight: 800; margin-bottom: 4px; }
        .emp-count { font-size: 0.75em; color: #aaa; text-transform: uppercase; margin-bottom: 20px; }
        .result-val { font-size: 2.8em; font-weight: 800; color: #3056a0; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg" class="flag">
        <h1>Your Fair Share</h1>
        <div class="subtitle">Worker Compensation Calculator</div>
        
        <div class="input-box">
            <label>Company Name or Ticker</label>
            <input type="text" id="company-input" value="Delek US Holdings">
            <div style="margin-top:20px">
                <div class="toggle-container">
                    <button class="toggle-btn active-toggle">Annual Salary</button>
                    <button class="toggle-btn">Hourly Wage</button>
                </div>
                <label>Annual Salary</label>
                <input type="text" id="salary-input" value="$ 12000">
            </div>
            <button class="calc-btn" onclick="calculate()">Calculate Fair Share</button>
        </div>

        <div id="results-area" style="display:none;">
            <div class="fs-label">Fair Share</div>
            <div class="company-name" id="res-name">Delek US Holdings</div>
            <div class="emp-count" id="res-emps">3,746 Employees</div>
            <p style="font-size:0.95em; line-height:1.5; color:#333; margin-top:16px;">
                If <strong id="res-name-bold">Delek US Holdings</strong> distributed their 'Net Income', <strong id="res-profit">$220M</strong>, evenly across its workforce, a worker at this pay level would earn:
            </p>
            <div class="result-val">$<span id="fair-share-amount">0</span></div>
        </div>
    </div>
    <script src="design-script.js"></script>
</body>
</html>
